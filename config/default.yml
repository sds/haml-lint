# Default application configuration that all configurations inherit from.
#
# This is an opinionated list of which hooks are valuable to run and what their
# out of the box settings should be.

# Whether to ignore frontmatter at the beginning of Haml documents for
# frameworks such as Jekyll/Middleman
skip_frontmatter: false

linters:
  AlignmentTabs:
    enabled: true

  AltText:
    enabled: false

  ClassAttributeWithStaticValue:
    enabled: true

  ClassesBeforeIds:
    enabled: true

  ConsecutiveComments:
    enabled: true
    max_consecutive: 1

  ConsecutiveSilentScripts:
    enabled: true
    max_consecutive: 2

  EmptyObjectReference:
    enabled: true

  EmptyScript:
    enabled: true

  FinalNewline:
    enabled: true
    present: true

  HtmlAttributes:
    enabled: true

  IdNames:
    enabled: true
    style: lisp_case

  ImplicitDiv:
    enabled: true

  Indentation:
    enabled: true
    character: space  # or tab
    width: 2  # ignored if character == tab

  InlineStyles:
    enabled: true

  InstanceVariables:
    enabled: true
    file_types: partials
    matchers:
      all: .*
      partials: \A_.*\.haml\z

  LeadingCommentSpace:
    enabled: true

  LineLength:
    enabled: true
    max: 80

  MultilinePipe:
    enabled: true

  MultilineScript:
    enabled: true

  NoPlaceholders:
    enabled: false

  ObjectReferenceAttributes:
    enabled: true

  RepeatedId:
    enabled: true
    severity: error

  RuboCop:
    enabled: true
    # Cops listed here are skipped entirely (passed to RuboCop via `--except`), both when
    # reporting and when auto-correcting. This is the way to disable a cop only for Haml files,
    # and the only way to disable a forced cop (see config/forced_rubocop_config.yml), since the
    # forced configuration always overrides `Enabled: false` set in your own .rubocop.yml.
    ignored_cops: []

  RubyComments:
    enabled: true

  SpaceBeforeScript:
    enabled: true

  SpaceInsideHashAttributes:
    enabled: true
    style: space

  StrictLocals:
    enabled: false
    file_types: partials
    matchers:
      all: .*
      partials: \A_.*\.haml\z

  TagName:
    enabled: true

  TrailingEmptyLines:
    enabled: true

  TrailingWhitespace:
    enabled: true

  UnescapedHtml:
    enabled: true

  UnnecessaryInterpolation:
    enabled: true

  UnnecessaryStringOutput:
    enabled: true

  ViewLength:
    enabled: true
    max: 100
