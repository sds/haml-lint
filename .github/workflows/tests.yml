name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rspec:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}-latest

    strategy:
      matrix:
        ruby-version:
          - "3.3"
          - "3.4"
          - "4.0"
        gemfile:
          - haml5.0
          - haml5.1
          - haml5.2
          - haml6.0
          - haml6.1
          - haml6.2
          - haml6.3
          - haml6.4
          - haml7.0
          - haml7.1
          - haml7.2
          - rubocop1.0
        os:
          - ubuntu

    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1.314.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        # We prefer to run without debug to catch errors in the "not debug" code
        run: HAML_LINT_DEBUG=false bundle exec rspec

      - name: Code coverage reporting
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        continue-on-error: true  # Coveralls is sometimes down
        with:
          github-token: ${{ secrets.github_token }}
          flag-name: ruby${{ matrix.ruby-version }}-${{ matrix.gemfile }}-${{ matrix.os }}
          parallel: true

  finish:
    needs: rspec
    runs-on: ubuntu-latest

    steps:
      - name: Finalize code coverage report
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        continue-on-error: true
        with:
          github-token: ${{ secrets.github_token }}
          parallel-finished: true
